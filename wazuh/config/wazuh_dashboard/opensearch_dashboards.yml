# Bind the dashboard's HTTP server to all interfaces so it's reachable from
# outside the container (via the Docker Compose port mapping).
server.host: 0.0.0.0
# Port the OpenSearch Dashboards (Wazuh dashboard) web server listens on.
server.port: 5601
# Wazuh indexer endpoint the dashboard backend queries; HTTPS on the
# indexer's REST API port, addressed by its Compose service name.
opensearch.hosts: https://wazuh.indexer:9200
# Validate the indexer's TLS certificate against a trusted CA (see
# opensearch.ssl.certificateAuthorities below) rather than trusting blindly
# ("none") or only checking hostname without full chain validation.
opensearch.ssl.verificationMode: certificate
# Extra HTTP headers the dashboard is allowed to forward to the indexer;
# "securitytenant" carries the OpenSearch Security multi-tenant selection
# and "Authorization" carries the user's auth credentials/token.
opensearch.requestHeadersWhitelist: ["securitytenant","Authorization"]
# Multi-tenancy (separate saved-object spaces per tenant) is turned off —
# this deployment uses a single global tenant.
opensearch_security.multitenancy.enabled: false
# Roles listed here get a read-only dashboard UI (no ability to change
# saved objects/visualizations), e.g. auditors or read-only demo users.
opensearch_security.readonly_mode.roles: ["kibana_read_only"]
# Enable HTTPS on the dashboard's own web server (browser-facing TLS).
server.ssl.enabled: true
# Private key for the dashboard's HTTPS listener.
server.ssl.key: "/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem"
# Certificate for the dashboard's HTTPS listener, generated by
# wazuh-certs-generator per config/certs.yml.
server.ssl.certificate: "/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem"
# CA bundle used to validate the indexer's certificate referenced by
# opensearch.ssl.verificationMode above.
opensearch.ssl.certificateAuthorities: ["/usr/share/wazuh-dashboard/certs/root-ca.pem"]
# Default landing page after login is the Wazuh home app, not the stock
# OpenSearch Dashboards home.
uiSettings.overrides.defaultRoute: /app/wz-home
# Session expiration settings
# How long (ms) the browser session cookie remains valid before it expires;
# 900000 ms = 15 minutes.
opensearch_security.cookie.ttl: 900000
# Server-side session lifetime (ms), matching the cookie TTL above so both
# expire together.
opensearch_security.session.ttl: 900000
# Extend (refresh) the session on activity rather than enforcing a hard
# expiry regardless of use, so active users aren't logged out mid-work.
opensearch_security.session.keepalive: true
