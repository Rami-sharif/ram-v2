# Bind the indexer's HTTP/transport listeners to all interfaces so other
# containers (manager, dashboard, certs generator) can reach it.
network.host: "0.0.0.0"
# Logical node name for this OpenSearch/Wazuh indexer node, matching its
# Compose service name and the certificate CN issued for it.
node.name: "wazuh.indexer"
# Directory where index data (shards/segments) is persisted; mounted as a
# volume so data survives container restarts.
path.data: /var/lib/wazuh-indexer
# Directory where the indexer writes its own log files.
path.logs: /var/log/wazuh-indexer
# Single-node discovery mode: the node elects itself as cluster manager
# instead of waiting to discover peers, appropriate for this one-node setup.
discovery.type: single-node
# Port range for the REST/HTTP API; a range (rather than a fixed port)
# lets the node pick the first free port in the band if 9200 is taken.
http.port: 9200-9299
# Port range for internal node-to-node transport traffic (irrelevant with a
# single node, but required by the schema and needed if the cluster grows).
transport.tcp.port: 9300-9399
# Report a compatible version string in the main API response so tools
# expecting a specific Elasticsearch/OpenSearch version don't reject this
# node.
compatibility.override_main_response_version: true
# TLS certificate presented by the indexer's HTTP (REST API) listener.
plugins.security.ssl.http.pemcert_filepath: /usr/share/wazuh-indexer/certs/wazuh.indexer.pem
# Private key matching the HTTP listener's certificate above.
plugins.security.ssl.http.pemkey_filepath: /usr/share/wazuh-indexer/certs/wazuh.indexer.key
# CA bundle used to validate client certificates on the HTTP listener.
plugins.security.ssl.http.pemtrustedcas_filepath: /usr/share/wazuh-indexer/certs/root-ca.pem
# TLS certificate presented by the indexer's internal transport (node-to-
# node) listener.
plugins.security.ssl.transport.pemcert_filepath: /usr/share/wazuh-indexer/certs/wazuh.indexer.pem
# Private key matching the transport listener's certificate above.
plugins.security.ssl.transport.pemkey_filepath: /usr/share/wazuh-indexer/certs/wazuh.indexer.key
# CA bundle used to validate peer certificates on the transport layer.
plugins.security.ssl.transport.pemtrustedcas_filepath: /usr/share/wazuh-indexer/certs/root-ca.pem
# Require TLS on the HTTP/REST API (no plaintext access to the indexer).
plugins.security.ssl.http.enabled: true
# Do not enforce hostname verification on transport-layer certificates
# (acceptable in a single-node setup where node identity is already fixed
# by the shared cluster key/certs).
plugins.security.ssl.transport.enforce_hostname_verification: false
# Do not attempt reverse-DNS hostname resolution for transport peers;
# containers are addressed by their Compose service names, not reverse DNS.
plugins.security.ssl.transport.resolve_hostname: false
# Distinguished Names (from certificate Subject) that are granted
# super-admin privileges over the security plugin itself.
plugins.security.authcz.admin_dn:
# The admin client certificate's DN, generated by wazuh-certs-generator,
# used for security-plugin administration (e.g. securityadmin.sh).
- "CN=admin,OU=Wazuh,O=Wazuh,L=California,C=US"
# Enforce that only users with adequate privileges can write
# snapshot/restore data (extra guard on top of the role grant below).
plugins.security.check_snapshot_restore_write_privileges: true
# Enable the snapshot/restore privilege system so backend roles like
# "snapshotrestore" (see internal_users.yml) can be granted that access.
plugins.security.enable_snapshot_restore_privilege: true
# Distinguished Names of certificates that are trusted as cluster member
# nodes (as opposed to plain HTTP clients).
plugins.security.nodes_dn:
# This single indexer node's own certificate DN, so it recognizes itself
# as a legitimate cluster member.
- "CN=wazuh.indexer,OU=Wazuh,O=Wazuh,L=California,C=US"
# Which security-plugin REST API roles are permitted to call the
# management REST API at all.
plugins.security.restapi.roles_enabled:
# Full-access role can call every security REST API endpoint.
- "all_access"
# Narrower role scoped specifically to security REST API management.
- "security_rest_api_access"
# Enable protection for internal "system indices" so regular users/roles
# can't read or tamper with plugin-internal state.
plugins.security.system_indices.enabled: true
# Explicit list of index name patterns treated as protected system indices
# (alerting, anomaly detection, reporting, notifications, notebooks,
# observability, async search, and replication metadata store).
plugins.security.system_indices.indices: [".opendistro-alerting-config", ".opendistro-alerting-alert*", ".opendistro-anomaly-results*", ".opendistro-anomaly-detector*", ".opendistro-anomaly-checkpoints", ".opendistro-anomaly-detection-state", ".opendistro-reports-*", ".opendistro-notifications-*", ".opendistro-notebooks", ".opensearch-observability", ".opendistro-asynchronous-search-response*", ".replication-metadata-store"]
# Allow the security plugin to auto-initialize its .opendistro_security
# index from this config on first startup, so securityadmin.sh doesn't
# have to be run manually before the cluster is usable.
plugins.security.allow_default_init_securityindex: true
# Disable the disk-based allocation threshold that would otherwise block
# shard allocation when disk usage crosses a watermark — avoids the
# single-node dev/demo deployment refusing writes on a small disk.
cluster.routing.allocation.disk.threshold_enabled: false
