<!-- Root element of the OSSEC/Wazuh manager configuration file (ossec.conf).
     Everything the wazuh-manager daemon reads at startup lives inside this
     single top-level tag. -->
<ossec_config>
  <!-- Global settings that apply to the manager as a whole: output formats,
       alerting behavior, e-mail notifications, and agent timeouts. -->
  <global>
    <!-- Emit alerts in JSON as well as plain text, so they can be read by
         Filebeat/the indexer pipeline (which expects structured JSON). -->
    <jsonout_output>yes</jsonout_output>
    <!-- Write matched events to alerts.log (in addition to any JSON output). -->
    <alerts_log>yes</alerts_log>
    <!-- Do not log every single event (only matched/alerted ones) to keep
         disk usage and indexing volume manageable. -->
    <logall>no</logall>
    <!-- Same as logall but for the JSON format; kept disabled for the same
         reason (avoids logging the full firehose of raw events). -->
    <logall_json>no</logall_json>
    <!-- E-mail notifications are disabled; this stack forwards alerts via
         the custom-ramv2 webhook integration instead of SMTP. -->
    <email_notification>no</email_notification>
    <!-- Placeholder SMTP relay; irrelevant while email_notification is "no"
         but left as documentation for how to wire it up later. -->
    <smtp_server>smtp.example.wazuh.com</smtp_server>
    <!-- Placeholder "From" address for the (currently disabled) e-mail
         notifications. -->
    <email_from>wazuh@example.wazuh.com</email_from>
    <!-- Placeholder "To" address for the (currently disabled) e-mail
         notifications. -->
    <email_to>recipient@example.wazuh.com</email_to>
    <!-- Cap on how many alert e-mails can be sent per hour, to avoid a
         flood of messages during an alert storm. -->
    <email_maxperhour>12</email_maxperhour>
    <!-- Which log file e-mail alerts are sourced from. -->
    <email_log_source>alerts.log</email_log_source>
    <!-- How long an agent can go without a keepalive before it is
         considered disconnected. -->
    <agents_disconnection_time>10m</agents_disconnection_time>
    <!-- Delay before raising an alert once an agent is marked disconnected;
         0 means alert immediately upon disconnection. -->
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!-- Thresholds controlling which rule matches actually get logged/e-mailed. -->
  <alerts>
    <!-- Minimum rule level that gets written to the alerts log (3 = fairly
         low, so most matched rules are captured). -->
    <log_alert_level>3</log_alert_level>
    <!-- Minimum rule level required to trigger an e-mail alert (moot here
         since e-mail is disabled, but documents the intended threshold). -->
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- Choose between "plain", "json", or "plain,json" for the format of internal logs -->
  <logging>
    <!-- Internal wazuh-manager process logs are kept as plain text (not
         JSON) since they're for operator troubleshooting, not indexing. -->
    <log_format>plain</log_format>
  </logging>

  <!-- Settings for the manager's remote listener that agents connect to. -->
  <remote>
    <!-- Require the encrypted/authenticated Wazuh agent protocol (as
         opposed to "syslog", which accepts plain unauthenticated events). -->
    <connection>secure</connection>
    <!-- TCP port agents connect to for the secure protocol. -->
    <port>1514</port>
    <!-- Use TCP (rather than UDP) for reliable delivery of agent events. -->
    <protocol>tcp</protocol>
    <!-- Internal queue depth for buffering incoming agent messages before
         processing; raised above default to tolerate bursts. -->
    <queue_size>131072</queue_size>
  </remote>

  <!-- Policy monitoring -->
  <!-- Rootcheck scans hosts for rootkits, hidden processes, and policy
       violations. -->
  <rootcheck>
    <!-- Rootcheck module is active (not disabled). -->
    <disabled>no</disabled>
    <!-- Look for known rootkit signature files on disk. -->
    <check_files>yes</check_files>
    <!-- Look for known trojaned system binaries. -->
    <check_trojans>yes</check_trojans>
    <!-- Check /dev for anomalies (e.g. unexpected device files). -->
    <check_dev>yes</check_dev>
    <!-- Check system configuration/kernel-level indicators. -->
    <check_sys>yes</check_sys>
    <!-- Look for hidden processes not visible via normal process listing. -->
    <check_pids>yes</check_pids>
    <!-- Look for hidden/listening ports not visible via normal tools. -->
    <check_ports>yes</check_ports>
    <!-- Check network interfaces for promiscuous mode (packet sniffing). -->
    <check_if>yes</check_if>

    <!-- Frequency that rootcheck is executed - every 12 hours -->
    <frequency>43200</frequency>

    <!-- Path (relative to the manager install dir) to the rootkit file
         signature database used by check_files. -->
    <rootkit_files>etc/rootcheck/rootkit_files.txt</rootkit_files>
    <!-- Path to the rootkit trojan signature database used by
         check_trojans. -->
    <rootkit_trojans>etc/rootcheck/rootkit_trojans.txt</rootkit_trojans>

    <!-- Skip NFS-mounted filesystems to avoid slow scans and false
         positives on network storage. -->
    <skip_nfs>yes</skip_nfs>
  </rootcheck>

  <!-- CIS-CAT compliance-scanning module wodle (disabled by default; would
       require the CIS-CAT Java tool to be installed to be useful). -->
  <wodle name="cis-cat">
    <!-- Module disabled — not used in this deployment. -->
    <disabled>yes</disabled>
    <!-- Max seconds a scan is allowed to run before being killed. -->
    <timeout>1800</timeout>
    <!-- How often the scan would run if enabled. -->
    <interval>1d</interval>
    <!-- Run a scan immediately on manager start (if enabled). -->
    <scan-on-start>yes</scan-on-start>

    <!-- Path to the bundled Java runtime used to launch CIS-CAT. -->
    <java_path>wodles/java</java_path>
    <!-- Path to the CIS-CAT installation/tool directory. -->
    <ciscat_path>wodles/ciscat</ciscat_path>
  </wodle>

  <!-- Osquery integration -->
  <!-- Wodle that ingests osquery's result log; disabled here since no
       osquery agent/config is provisioned in this stack. -->
  <wodle name="osquery">
    <!-- Module disabled — not used in this deployment. -->
    <disabled>yes</disabled>
    <!-- Would run/manage the osqueryd daemon directly if enabled. -->
    <run_daemon>yes</run_daemon>
    <!-- Path osquery would write its JSON results log to. -->
    <log_path>/var/log/osquery/osqueryd.results.log</log_path>
    <!-- Path to the osquery daemon's own configuration file. -->
    <config_path>/etc/osquery/osquery.conf</config_path>
    <!-- Add Wazuh labels to forwarded osquery events. -->
    <add_labels>yes</add_labels>
  </wodle>

  <!-- System inventory -->
  <!-- Syscollector periodically gathers hardware/OS/network/software
       inventory from the host and indexes it for asset visibility. -->
  <wodle name="syscollector">
    <!-- Module enabled — inventory collection is active. -->
    <disabled>no</disabled>
    <!-- How often a full inventory scan runs. -->
    <interval>1h</interval>
    <!-- Run an inventory scan immediately when the manager starts, rather
         than waiting a full interval. -->
    <scan_on_start>yes</scan_on_start>
    <!-- Collect hardware inventory (CPU, RAM, etc.). -->
    <hardware>yes</hardware>
    <!-- Collect OS version/build inventory. -->
    <os>yes</os>
    <!-- Collect network interface/address inventory. -->
    <network>yes</network>
    <!-- Collect installed package/software inventory. -->
    <packages>yes</packages>
    <!-- Collect open port inventory; all="yes" also includes ports without
         an associated process. -->
    <ports all="yes">yes</ports>
    <!-- Collect running process inventory. -->
    <processes>yes</processes>

    <!-- Database synchronization settings -->
    <!-- Controls how syscollector syncs its inventory database deltas to
         the manager/indexer. -->
    <synchronization>
      <!-- Cap on sync events per second to avoid overwhelming the
           manager/indexer with inventory deltas. -->
      <max_eps>10</max_eps>
    </synchronization>
  </wodle>

  <!-- Security Configuration Assessment: runs CIS-style policy checks
       against the host to flag hardening/compliance gaps. -->
  <sca>
    <!-- SCA module enabled. -->
    <enabled>yes</enabled>
    <!-- Run a scan immediately on manager start. -->
    <scan_on_start>yes</scan_on_start>
    <!-- How often SCA scans repeat. -->
    <interval>12h</interval>
    <!-- Skip NFS-mounted filesystems during scans. -->
    <skip_nfs>yes</skip_nfs>
  </sca>

  <!-- Vulnerability detection module: correlates installed package
       inventory (from syscollector) against CVE feeds to flag vulnerable
       software. -->
  <vulnerability-detection>
    <!-- Vulnerability detection enabled. -->
    <enabled>yes</enabled>
    <!-- Index vulnerability scan status/results into the indexer so they
         show up in the dashboard. -->
    <index-status>yes</index-status>
    <!-- How often the CVE feed is refreshed from the vulnerability
         provider. -->
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <!-- Configures the manager's direct connection to the Wazuh indexer for
       writing alerts/state (used by internal indexer-connector, separate
       from the Filebeat-based shipping path). -->
  <indexer>
    <!-- Direct indexer connection enabled. -->
    <enabled>yes</enabled>
    <!-- List of indexer endpoints the manager can write to. -->
    <hosts>
      <!-- Single-node indexer reachable over HTTPS on its REST API port. -->
      <host>https://wazuh.indexer:9200</host>
    </hosts>
    <!-- TLS settings used when the manager talks to the indexer directly. -->
    <ssl>
      <!-- CA certificate(s) used to validate the indexer's server
           certificate. -->
      <certificate_authorities>
        <ca>/etc/ssl/root-ca.pem</ca>
      </certificate_authorities>
      <!-- Client certificate presented by the manager (reusing the
           filebeat cert/key pair for this connection). -->
      <certificate>/etc/ssl/filebeat.pem</certificate>
      <!-- Private key matching the client certificate above. -->
      <key>/etc/ssl/filebeat.key</key>
    </ssl>
  </indexer>

  <!-- File integrity monitoring -->
  <!-- Syscheck watches configured files/directories for changes and raises
       alerts on creation, modification, or deletion. -->
  <syscheck>
    <!-- FIM is active (not disabled). -->
    <disabled>no</disabled>

    <!-- Frequency that syscheck is executed default every 12 hours -->
    <frequency>43200</frequency>

    <!-- Run a full filesystem scan immediately on manager start. -->
    <scan_on_start>yes</scan_on_start>

    <!-- Generate alert when new file detected -->
    <alert_new_files>yes</alert_new_files>

    <!-- Don't ignore files that change more than 'frequency' times -->
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- Directories to check  (perform all possible verifications) -->
    <!-- Core binary directories monitored for tampering (permissions,
         hashes, size, etc. — the default deep verification mode). -->
    <directories>/etc,/usr/bin,/usr/sbin</directories>
    <!-- Additional boot/system binary directories monitored the same way. -->
    <directories>/bin,/sbin,/boot</directories>

    <!-- Files/directories to ignore -->
    <!-- mtab changes constantly (mounted filesystems) and isn't security
         relevant, so it's excluded from FIM noise. -->
    <ignore>/etc/mtab</ignore>
    <!-- hosts.deny is updated by things like fail2ban/TCP wrappers during
         normal operation. -->
    <ignore>/etc/hosts.deny</ignore>
    <!-- Mail statistics file changes routinely and isn't security
         relevant. -->
    <ignore>/etc/mail/statistics</ignore>
    <!-- Random seed file is rewritten on every reboot by design. -->
    <ignore>/etc/random-seed</ignore>
    <!-- Same as above under its alternate filename used by some distros. -->
    <ignore>/etc/random.seed</ignore>
    <!-- adjtime is updated continuously by the system clock daemon. -->
    <ignore>/etc/adjtime</ignore>
    <!-- Apache log directory changes constantly and is monitored
         separately via log analysis, not FIM. -->
    <ignore>/etc/httpd/logs</ignore>
    <!-- Binary login-record file that changes on every login/logout. -->
    <ignore>/etc/utmpx</ignore>
    <!-- Binary login-history file that changes on every login/logout. -->
    <ignore>/etc/wtmpx</ignore>
    <!-- CUPS printing certs directory changes routinely and isn't
         security relevant here. -->
    <ignore>/etc/cups/certs</ignore>
    <!-- Filesystem dump-schedule bookkeeping file, updated automatically. -->
    <ignore>/etc/dumpdates</ignore>
    <!-- Volatile service state directory that changes during normal
         service operation. -->
    <ignore>/etc/svc/volatile</ignore>

    <!-- File types to ignore -->
    <!-- Skip rotating log files and vi swap files entirely — they change
         constantly and aren't meaningful FIM targets. -->
    <ignore type="sregex">.log$|.swp$</ignore>

    <!-- Check the file, but never compute the diff -->
    <!-- Private key is monitored for existence/permission changes, but its
         contents are never diffed/stored (sensitive material). -->
    <nodiff>/etc/ssl/private.key</nodiff>

    <!-- Skip NFS-mounted filesystems (avoids slow/unreliable scans over
         the network). -->
    <skip_nfs>yes</skip_nfs>
    <!-- Skip /dev pseudo-filesystem (device nodes, not real files). -->
    <skip_dev>yes</skip_dev>
    <!-- Skip /proc pseudo-filesystem (kernel/process state, not real
         files). -->
    <skip_proc>yes</skip_proc>
    <!-- Skip /sys pseudo-filesystem (kernel objects, not real files). -->
    <skip_sys>yes</skip_sys>

    <!-- Nice value for Syscheck process -->
    <process_priority>10</process_priority>

    <!-- Maximum output throughput -->
    <max_eps>100</max_eps>

    <!-- Database synchronization settings -->
    <!-- Controls how FIM database deltas are synced to the manager. -->
    <synchronization>
      <!-- Sync feature enabled. -->
      <enabled>yes</enabled>
      <!-- Baseline interval between sync attempts. -->
      <interval>5m</interval>
      <!-- Upper bound the interval can back off to under repeated
           failures. -->
      <max_interval>1h</max_interval>
      <!-- Cap on sync events per second sent to the manager. -->
      <max_eps>10</max_eps>
    </synchronization>
  </syscheck>

  <!-- Active response -->
  <!-- Second <global> block (OSSEC allows repeating this section) scoped to
       active-response specific settings: hosts exempt from automated
       responses like IP blocking. -->
  <global>
    <!-- Never apply active responses (e.g. firewall-drop) to localhost, to
         avoid a misfiring rule locking out the manager itself. -->
    <white_list>127.0.0.1</white_list>
    <!-- Same protection for the "localhost.localdomain" hostname form. -->
    <white_list>^localhost.localdomain$</white_list>
  </global>

  <!-- Active-response command definition: disables a compromised user
       account when triggered. -->
  <command>
    <!-- Identifier referenced by an <active-response> block to invoke this
         command. -->
    <name>disable-account</name>
    <!-- Script/binary (in active-response/bin) that gets executed. -->
    <executable>disable-account</executable>
    <!-- This command supports being automatically reverted after a
         timeout (e.g. re-enable the account later). -->
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- Active-response command definition: restarts the Wazuh agent/service
       on the target host. -->
  <command>
    <name>restart-wazuh</name>
    <executable>restart-wazuh</executable>
  </command>

  <!-- Active-response command definition: blocks an offending IP via the
       host firewall. -->
  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop</executable>
    <!-- Block can be automatically lifted after a timeout window. -->
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- Active-response command definition: denies a host via TCP
       wrappers/hosts.deny style blocking. -->
  <command>
    <name>host-deny</name>
    <executable>host-deny</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- Active-response command definition: null-routes an offending IP at
       the OS routing layer (Linux). -->
  <command>
    <name>route-null</name>
    <executable>route-null</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- Active-response command definition: Windows equivalent of route-null
       using the .exe active-response helper. -->
  <command>
    <name>win_route-null</name>
    <executable>route-null.exe</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- Active-response command definition: Windows firewall blocking via
       netsh.exe. -->
  <command>
    <name>netsh</name>
    <executable>netsh.exe</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!--
  <active-response>
    active-response options here
  </active-response>
  -->
  <!-- Example/placeholder left commented out: no active-response block is
       actually wired to any of the <command> definitions above, so none of
       them fire automatically in this deployment (they exist only as
       building blocks if active response is enabled later). -->

  <!-- Log analysis -->
  <!-- Command-based localfile: periodically runs a shell command and
       treats its stdout as a log source. -->
  <localfile>
    <!-- "command" format means the manager executes the command itself
         (as opposed to tailing a file). -->
    <log_format>command</log_format>
    <!-- Reports disk usage/free space — useful for capacity alerting. -->
    <command>df -P</command>
    <!-- Re-run the command every 360 seconds (6 minutes). -->
    <frequency>360</frequency>
  </localfile>

  <!-- Command-based localfile that captures listening TCP/UDP ports,
       reformatted into a stable, sorted, greppable layout. -->
  <localfile>
    <!-- "full_command" also captures stderr and preserves the command's
         exact multi-line output shape. -->
    <log_format>full_command</log_format>
    <!-- netstat piped through sed/sort to normalize "proto addr:port pid/name"
         into a consistent single-line-per-port format for rule matching. -->
    <command>netstat -tulpn | sed 's/\([[:alnum:]]\+\)\ \+[[:digit:]]\+\ \+[[:digit:]]\+\ \+\(.*\):\([[:digit:]]*\)\ \+\([0-9\.\:\*]\+\).\+\ \([[:digit:]]*\/[[:alnum:]\-]*\).*/\1 \2 == \3 == \4 \5/' | sort -k 4 -g | sed 's/ == \(.*\) ==/:\1/' | sed 1,2d</command>
    <!-- Friendly label shown in the manager's log/rule matching for this
         source. -->
    <alias>netstat listening ports</alias>
    <!-- Re-run every 360 seconds. -->
    <frequency>360</frequency>
  </localfile>

  <!-- Command-based localfile that reports the last 20 login sessions,
       useful for detecting unexpected/after-hours logins. -->
  <localfile>
    <log_format>full_command</log_format>
    <command>last -n 20</command>
    <frequency>360</frequency>
  </localfile>

  <!-- Controls which decoders/rules the manager loads to parse and
       classify incoming events. -->
  <ruleset>
    <!-- Default ruleset -->
    <!-- Directory containing Wazuh's built-in decoders (event parsers). -->
    <decoder_dir>ruleset/decoders</decoder_dir>
    <!-- Directory containing Wazuh's built-in detection rules. -->
    <rule_dir>ruleset/rules</rule_dir>
    <!-- Skip the bundled policy-monitoring ruleset file to avoid noisy/
         redundant policy alerts not needed in this deployment. -->
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <!-- CDB list mapping audit key names used for correlating Linux audit
         events. -->
    <list>etc/lists/audit-keys</list>
    <!-- CDB list of AWS CloudTrail event names used by AWS rules. -->
    <list>etc/lists/amazon/aws-eventnames</list>
    <!-- CDB list mapping Windows Security event channel IDs. -->
    <list>etc/lists/security-eventchannel</list>
    <!-- Threat-intel list of known-malicious IPs used for IOC matching. -->
    <list>etc/lists/malicious-ioc/malicious-ip</list>
    <!-- Threat-intel list of known-malicious domains used for IOC
         matching. -->
    <list>etc/lists/malicious-ioc/malicious-domains</list>
    <!-- Threat-intel list of known-malicious file hashes used for IOC
         matching. -->
    <list>etc/lists/malicious-ioc/malware-hashes</list>

    <!-- User-defined ruleset -->
    <!-- Directory for locally added/custom decoders, loaded after the
         defaults so they can extend parsing. -->
    <decoder_dir>etc/decoders</decoder_dir>
    <!-- Directory for locally added/custom rules, loaded after the
         defaults so they can extend or override detections. -->
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

  <!-- Settings for the wazuh-logtest utility used to test rules/decoders
       against sample events without affecting live alerting. -->
  <rule_test>
    <!-- Rule testing feature enabled. -->
    <enabled>yes</enabled>
    <!-- Number of worker threads servicing test requests. -->
    <threads>1</threads>
    <!-- Maximum concurrent logtest sessions allowed. -->
    <max_sessions>64</max_sessions>
    <!-- Idle session is torn down after this timeout. -->
    <session_timeout>15m</session_timeout>
  </rule_test>

  <!-- Configuration for wazuh-authd -->
  <!-- wazuh-authd handles automatic agent enrollment/registration. -->
  <auth>
    <!-- authd service is active (not disabled), so agents can self-enroll. -->
    <disabled>no</disabled>
    <!-- Port agents connect to in order to request an enrollment
         certificate/key. -->
    <port>1515</port>
    <!-- Do not force agents to register using their observed source IP
         (allows registration behind NAT). -->
    <use_source_ip>no</use_source_ip>
    <!-- Automatically remove stale/duplicate agent keys on re-registration. -->
    <purge>yes</purge>
    <!-- Password-based enrollment is disabled; relies on TLS/registration
         flow instead of a shared secret. -->
    <use_password>no</use_password>
    <!-- OpenSSL cipher string restricting authd's TLS listener to strong
         ciphers, explicitly excluding weak/broken ones (anonymous DH,
         export-grade, MD5, RC4, 3DES, Camellia). -->
    <ciphers>HIGH:!ADH:!EXP:!MD5:!RC4:!3DES:!CAMELLIA:@STRENGTH</ciphers>
    <!-- <ssl_agent_ca></ssl_agent_ca> -->
    <!-- Left commented out/unset: no custom CA is required to validate
         agent certificates during enrollment in this deployment. -->
    <!-- Do not verify the connecting agent's hostname against its
         certificate (agents may connect from dynamic/container hostnames). -->
    <ssl_verify_host>no</ssl_verify_host>
    <!-- Manager's own certificate presented to agents during enrollment
         TLS handshake. -->
    <ssl_manager_cert>etc/sslmanager.cert</ssl_manager_cert>
    <!-- Private key matching the manager's enrollment certificate. -->
    <ssl_manager_key>etc/sslmanager.key</ssl_manager_key>
    <!-- Do not auto-negotiate SSL/TLS version; use the compiled-in
         default protocol version explicitly. -->
    <ssl_auto_negotiate>no</ssl_auto_negotiate>
  </auth>

  <!-- Wazuh manager clustering configuration (for horizontal scaling across
       multiple manager nodes sharing rules/agent state). -->
  <cluster>
    <!-- Logical cluster name; all nodes in the same cluster must match. -->
    <name>wazuh</name>
    <!-- This node's unique name within the cluster. -->
    <node_name>node01</node_name>
    <!-- This node acts as the cluster master (as opposed to "worker"). -->
    <node_type>master</node_type>
    <!-- Shared symmetric key used to authenticate/encrypt inter-node
         cluster traffic; must be identical across all nodes. -->
    <key>aa093264ef885029653eea20dfcf51ae</key>
    <!-- TCP port used for inter-node cluster communication. -->
    <port>1516</port>
    <!-- Listen on all interfaces for cluster connections. -->
    <bind_addr>0.0.0.0</bind_addr>
    <!-- List of nodes that belong to the cluster. -->
    <nodes>
        <!-- This single-manager deployment only lists itself. -->
        <node>wazuh.manager</node>
    </nodes>
    <!-- Cluster status is visible (not hidden) in API/dashboard output. -->
    <hidden>no</hidden>
    <!-- Clustering is disabled overall — this is a single-node manager, so
         the settings above are inert but kept as documentation/scaffolding
         for future multi-node expansion. -->
    <disabled>yes</disabled>
  </cluster>

  <!-- RAM v2: forward high-severity alerts to the agent webhook.
       level>=10 escalates serious alerts only (tune as needed). -->
  <integration>
    <!-- References the custom-ramv2 / custom-ramv2.py script pair in
         wazuh/integrations/, which the integrator daemon invokes for each
         matching alert. -->
    <name>custom-ramv2</name>
    <!-- URL of the downstream agent service that receives forwarded
         alerts; resolves via the Docker Compose service name. -->
    <hook_url>http://agent-service:8000/webhook/wazuh</hook_url>
    <!-- Only forward alerts at or above this rule level, so low-severity
         noise doesn't spam the agent webhook. -->
    <level>10</level>
    <!-- Alert is passed to the integration script as JSON (matches what
         custom-ramv2.py expects to parse). -->
    <alert_format>json</alert_format>
  </integration>

  <!-- RAM v2: demo log source for generating genuine alerts during testing. -->
  <localfile>
    <!-- Treat the file as syslog-formatted text so default syslog
         decoders/rules can parse and score it. -->
    <log_format>syslog</log_format>
    <!-- Path to the demo log file that test/demo events get appended to,
         so this deployment can produce real alerts without a live agent. -->
    <location>/var/log/ramv2-demo.log</location>
  </localfile>

</ossec_config>

<!-- A second, separate <ossec_config> root block — OSSEC config files
     support multiple top-level blocks that get merged, which is used here
     to add one more localfile source without touching the block above. -->
<ossec_config>
  <!-- Ingests the manager's own active-response log, so active-response
       executions themselves become visible/alertable events. -->
  <localfile>
    <!-- Plain syslog-style text format for this log file. -->
    <log_format>syslog</log_format>
    <!-- Path to the manager's active-response execution log. -->
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

</ossec_config>
