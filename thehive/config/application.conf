# ============================================================
# RAM v2 — TheHive 5 configuration (Phase 1)
# Storage: JanusGraph + BerkeleyDB (local, single-node)
# Index:   Elasticsearch
# Secrets are injected via included files (index.conf, secret.conf)
# rendered from *.template by scripts/render-thehive-config.sh using
# values from .env. The rendered files are gitignored — no secret
# is ever committed.
# ============================================================

# ---- SECRET (play.http.secret.key) ----
# Pull in the rendered file that defines the Play application secret key (session/crypto signing).
# Kept out of this file so the secret itself never lives in a committed/tracked config.
include "/etc/thehive/secret.conf"

# ---- DATABASE (local BerkeleyDB, no Cassandra) ----
# JanusGraph storage backend configuration for TheHive's graph database.
db.janusgraph.storage {
  # Use the embedded BerkeleyDB JE backend instead of a separate Cassandra cluster (single-node/local setup).
  backend = berkeleyje
  # On-disk location where BerkeleyDB stores the graph data (persisted via the container volume).
  directory = /opt/thp/thehive/database
}

# ---- INDEX (Elasticsearch, with credentials) ----
# Pull in the rendered file that defines the Elasticsearch connection + credentials for JanusGraph's search index.
# Kept out of this file so the Elasticsearch password never lives in a committed/tracked config.
include "/etc/thehive/index.conf"

# ---- ATTACHMENTS STORAGE (local filesystem) ----
# Where TheHive stores uploaded case attachments/observables.
storage {
  # Store attachments on the local filesystem rather than S3/HDFS (single-node/local setup).
  provider = localfs
  # On-disk directory for attachment files (persisted via the container volume).
  localfs.location = /opt/thp/thehive/files
}

# ---- PLAY HTTP ----
# Base URL path prefix TheHive is served under (matches the reverse-proxy/route configuration).
play.http.context = "/thehive"
# Maximum size of a request body Play will buffer to disk (guards against oversized uploads exhausting disk).
play.http.parser.maxDiskBuffer = 1GB
# Maximum size of a request body Play will buffer in memory before spilling to disk (guards memory usage).
play.http.parser.maxMemoryBuffer = 256kB

# ---- SERVICE / STREAM ----
# How often the long-polling stream (used for live UI updates) refreshes/reconnects.
stream.longPolling.refresh = 45 seconds
# Retry/backoff behavior for the underlying stream "get" polling requests.
stream {
  get {
    # Maximum number of retry attempts before giving up on a single stream poll.
    maxAttempts = 5
    # Initial delay before the first retry.
    minBackoff = 100 milliseconds
    # Upper bound the backoff delay is capped at, even after repeated retries.
    maxBackoff = 500 milliseconds
    # Jitter factor applied to backoff delays to avoid thundering-herd retries.
    randomFactor = 0.2
  }
}

# Phase 1: no Cortex / MISP connectors enabled (kept minimal).
