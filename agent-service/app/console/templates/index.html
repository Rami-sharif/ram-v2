<!-- Inherit the shared page shell (topbar, nav, dock, flash) from base.html -->
{% extends "base.html" %}
<!-- Set the browser tab title for the console landing page -->
{% block title %}Console · RAM v2{% endblock %}
<!-- Start of this page's content, injected into base.html's content block -->
{% block content %}
<!-- Greeting using the logged-in analyst's display name from the session/auth context -->
<h1>Welcome, {{ analyst.display_name }}</h1>
<!-- Show the analyst's username and role for confirmation of the signed-in identity -->
<p>You are signed in as <strong>{{ analyst.username }}</strong> (role: {{ analyst.role }}).</p>
<!-- Muted placeholder note about upcoming features not yet built -->
<p class="muted">The alert queue, investigation details, and memory browser are coming next.</p>
<!-- Close the content block -->
{% endblock %}
